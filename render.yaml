services:
  - type: worker
    name: invoice-processor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python invoice_processor.py
    envVars:
      - key: IMAP_HOST
        sync: false
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
